  warning, info, and neutral types with smooth slide-in animation, optional
  title, and action button.
version: 0.0.5
homepage: https://github.com/dhruvin2004/top_toast
repository: https://github.com/dhruvin2004/top_toast
issue_tracker: https://github.com/dhruvin2004/top_toast/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

