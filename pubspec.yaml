name: top_toast
description: >-
  Top-sliding overlay toasts + confirmation dialogs for Flutter. Supports
  light/dark mode, 6 positions, 3 animations, queue/stack, progress bar,
  and six dialog types with async confirm support.
version: 0.0.8
homepage: https://github.com/dhruvin2004/top_toast
repository: https://github.com/dhruvin2004/top_toast
issue_tracker: https://github.com/dhruvin2004/top_toast/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
